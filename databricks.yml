bundle:
  name: databricks-lakehouse-pipeline

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-ebbaed51-488e.cloud.databricks.com
      root_path: /Workspace/Users/cakanilo@gmail.com/.bundle/${bundle.name}/${bundle.target}
  prod:
    mode: production
    workspace:
      host: https://dbc-ebbaed51-488e.cloud.databricks.com
      root_path: /Workspace/Users/cakanilo@gmail.com/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:

    # =========================================================
    # JOB 1: Pipeline de Politicos (existente - sem alteracao)
    # =========================================================
    lakehouse_pipeline_job:
      name: lakehouse-pipeline-job-${bundle.target}
      tasks:

        # ===== BRONZE (6 tasks em paralelo) =====
        - task_key: bronze_covid_19
          notebook_task:
            notebook_path: ./notebooks/bronze/01_bronze_ingest_projeto_politicos_covid_19

        - task_key: bronze_estabelecimentos
          notebook_task:
            notebook_path: ./notebooks/bronze/01_bronze_ingest_projeto_politicos_estabelecimentos_saude_goias

        - task_key: bronze_faixa_hetaria
          notebook_task:
            notebook_path: ./notebooks/bronze/01_bronze_ingest_projeto_politicos_faixa_hetaria_padre_bernardo

        - task_key: bronze_local_votacao
          notebook_task:
            notebook_path: ./notebooks/bronze/01_bronze_ingest_projeto_politicos_Local_votacao_secao

        - task_key: bronze_socio_demografico
          notebook_task:
            notebook_path: ./notebooks/bronze/01_bronze_ingest_projeto_politicos_socio_demografico_ibge

        - task_key: bronze_votacao_secao
          notebook_task:
            notebook_path: ./notebooks/bronze/01_bronze_ingest_projeto_politicos_votacao_secao_2024_GO

        # ===== SILVER (6 tasks em paralelo) =====
        - task_key: silver_covid_19
          depends_on:
            - task_key: bronze_covid_19
          notebook_task:
            notebook_path: ./notebooks/silver/02_silver_transform_projeto_politicos_covid_19

        - task_key: silver_estabelecimentos
          depends_on:
            - task_key: bronze_estabelecimentos
          notebook_task:
            notebook_path: ./notebooks/silver/02_silver_transform_projeto_politicos_estabelecimentos_saude_go

        - task_key: silver_faixa_hetaria
          depends_on:
            - task_key: bronze_faixa_hetaria
          notebook_task:
            notebook_path: ./notebooks/silver/02_silver_transform_projeto_politicos_faixa_hetaria_padre_bernardo_22

        - task_key: silver_local_votacao
          depends_on:
            - task_key: bronze_local_votacao
          notebook_task:
            notebook_path: ./notebooks/silver/02_silver_transform_projeto_politicos_local_votacao_secao

        - task_key: silver_socio_demografico
          depends_on:
            - task_key: bronze_socio_demografico
          notebook_task:
            notebook_path: ./notebooks/silver/02_silver_transform_projeto_politicos_socio_demografico_ibge

        - task_key: silver_votacao_secao
          depends_on:
            - task_key: bronze_votacao_secao
          notebook_task:
            notebook_path: ./notebooks/silver/02_silver_transform_projeto_politicos_votacao_secao_2024_GO

        # ===== GOLD (depende de todas as Silvers) =====
        - task_key: gold_aggregate
          depends_on:
            - task_key: silver_covid_19
            - task_key: silver_estabelecimentos
            - task_key: silver_faixa_hetaria
            - task_key: silver_local_votacao
            - task_key: silver_socio_demografico
            - task_key: silver_votacao_secao
          notebook_task:
            notebook_path: ./notebooks/gold/02_gold_aggregate_projeto_politicos_joins

    # =========================================================
    # JOB 2: Pipeline de Apostas Reviews (NOVO - isolado)
    # =========================================================
    # Pre-requisito: o JSON deve estar no Volume antes do job rodar.
    # No Free Edition, a coleta da API roda no PC (00_api_extract.py).
    # Schedule diario configurado mas pausado por padrao - ative
    # quando automatizar a coleta ou faca runs manuais via UI.
    apostas_reviews_pipeline_job:
      name: apostas-reviews-pipeline-job-${bundle.target}

      schedule:
        quartz_cron_expression: "0 0 7 * * ?"
        timezone_id: America/Sao_Paulo
        pause_status: PAUSED

      tasks:

        # ===== BRONZE =====
        - task_key: bronze_apostas_reviews
          notebook_task:
            notebook_path: ./notebooks/bronze/apostas_reviews/01_bronze_ingest

        # ===== SILVER (depende da Bronze) =====
        - task_key: silver_apostas_reviews
          depends_on:
            - task_key: bronze_apostas_reviews
          notebook_task:
            notebook_path: ./notebooks/silver/apostas_reviews/02_silver_transform

        # ===== GOLD (depende da Silver) =====
        - task_key: gold_apostas_reviews
          depends_on:
            - task_key: silver_apostas_reviews
          notebook_task:
            notebook_path: ./notebooks/gold/apostas_reviews/03_gold_aggregate