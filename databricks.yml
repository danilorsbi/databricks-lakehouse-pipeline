bundle:
  name: databricks-lakehouse-pipeline

workspace:
  host: https://adb-<dbc-ebbaed51-488e.cloud.databricks.com>.azuredatabricks.net

resources:
  jobs:
    pipeline-job:
      name: lakehouse-pipeline-job

      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingest

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/02_silver_transform

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ./notebooks/03_gold_aggregate