bundle:
  name: databricks-lakehouse-pipeline

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://dbc-ebbaed51-488e.cloud.databricks.com
      root_path: /Workspace/Users/cakanilo@gmail.com/.bundle/${bundle.name}/${bundle.target}

  prod:
    mode: production
    workspace:
      host: https://dbc-ebbaed51-488e.cloud.databricks.com
      root_path: /Workspace/Users/cakanilo@gmail.com/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    lakehouse_pipeline_job:
      name: lakehouse-pipeline-job-${bundle.target}

      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingest.ipynb

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/02_silver_transform.ipynb

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ./notebooks/03_gold_aggregate.ipynb