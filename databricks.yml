bundle:
  name: databricks-lakehouse-pipeline

targets:
  dev:
    default: true
    workspace:
      host: https://dbc-ebbaed51-488e.cloud.databricks.com

resources:
  jobs:
    lakehouse_pipeline_job:
      name: lakehouse-pipeline-job

      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/01_bronze_ingest

        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: ./notebooks/02_silver_transform

        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: ./notebooks/03_gold_aggregate